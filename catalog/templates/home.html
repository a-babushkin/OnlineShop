{% extends 'base_layout.html' %}

{% block title %}Главная страница{% endblock %}

{% block content %}
<div class="row text-center">
    {% for product in products %}
    <div class="col-4">
        <div class="card mb-4 shadow bg-body-tertiary rounded">
            <img src="{{ product.image.url }}" class="card-img-top" alt="...">
            <div class="card-body">
                <h4 class="card-title">{{ product.title }}</h4>
<!--                <h1 class="card-title pricing-card-title">{{ product.price }}</h1>-->
                <div class="text-start">
<!--                    <p class="card-text"><i><b>Категория: </b></i>{{ product.category.title }}</p>-->
                    <p class="card-text bg-green"><i>{{ product.description|truncatechars:100 }}</i></p>
                </div>
                <a href="/catalog/product_details/{{ product.id }}" class="btn btn-primary mt-3">Подробно...</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
