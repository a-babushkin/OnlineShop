{% extends 'base_layout.html' %}

{% block title %}Главная страница{% endblock %}

{% block content %}
<div class="row text-center">
    {% for product in object_list %}
    <div class="col-4">
        <div class="card mb-4 shadow bg-body-tertiary rounded">
            <img src="{{ product.image.url }}" class="card-img-top" alt="...">
            <div class="card-body">
                <h4 class="card-title">{{ product.title }}</h4>
                <!--                <h1 class="card-title pricing-card-title">{{ product.price }}</h1>-->
                <div class="text-start">
                    <!--                    <p class="card-text"><i><b>Категория: </b></i>{{ product.category.title }}</p>-->
                    <p class="card-text bg-green"><i>{{ product.description|truncatechars:100 }}</i></p>
                </div>
                <div class="btn-group">
                    <a href="{% url 'catalog:product_detail' product.id %}" class="btn btn-primary mt-3">Просмотреть</a>
                    <a href="{% url 'catalog:product_edit' product.id %}"
                       class="btn btn-success mt-3">Изменить</a>
                    <a href="{% url 'catalog:product_delete' product.id %}"
                       class="btn btn-danger mt-3">Удалить</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
