{% extends 'base_layout.html' %}

{% block title %}Удаление товара{% endblock %}

{% block content %}
<h1 class="mb-4">Удалить Товар</h1>
<p>Вы уверены, что хотите удалить "{{ object.title }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'catalog:product_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
